environment:
  name: "large-scale-test"

  sites:
    - name: "site-tokyo"
      rack_rows: 5
      racks_per_row: 10
      hosts_per_rack: 6
      host_template: "standard-compute"

    - name: "site-osaka"
      rack_rows: 3
      racks_per_row: 8
      hosts_per_rack: 6
      host_template: "standard-compute"

    - name: "site-tokyo-gpu"
      rack_rows: 2
      racks_per_row: 5
      hosts_per_rack: 4
      host_template: "gpu-compute"

  host_templates:
    standard-compute:
      cpu_model: "Intel Xeon Gold 6348"
      cpu_sockets: 2
      cores_per_socket: 28
      threads_per_core: 2
      memory_gb: 512
      numa_nodes: 2
      nics:
        - name: "ens1f0"
          speed_gbps: 25
          sriov: true
        - name: "ens2f0"
          speed_gbps: 25
          sriov: false
      local_disks:
        - type: "nvme"
          size_gb: 1600

    gpu-compute:
      cpu_model: "Intel Xeon Gold 6348"
      cpu_sockets: 2
      cores_per_socket: 28
      threads_per_core: 2
      memory_gb: 1024
      numa_nodes: 2
      nics:
        - name: "ens1f0"
          speed_gbps: 25
          sriov: true
        - name: "ens2f0"
          speed_gbps: 25
          sriov: false
      local_disks:
        - type: "nvme"
          size_gb: 3200
      gpus:
        - model: "NVIDIA A100"
          count: 4

  storage_backends:
    - name: "ceph-pool-ssd"
      type: "ceph"
      total_capacity_tb: 500
      total_iops: 500000
      capabilities: ["ssd", "snapshot", "clone", "live_migration", "differential_transfer", "qos"]
      accessible_from: ["site-tokyo", "site-tokyo-gpu"]

    - name: "ceph-pool-hdd"
      type: "ceph"
      total_capacity_tb: 5000
      total_iops: 50000
      capabilities: ["hdd", "snapshot", "clone"]
      accessible_from: ["site-tokyo", "site-osaka"]

    - name: "nfs-archive"
      type: "nfs"
      total_capacity_tb: 10000
      total_iops: 10000
      capabilities: ["hdd"]
      accessible_from: ["site-tokyo", "site-osaka"]

  ovn_clusters:
    - name: "ovn-tokyo"
      covers: ["site-tokyo", "site-tokyo-gpu"]
    - name: "ovn-osaka"
      covers: ["site-osaka"]

  preload:
    vms_per_host:
      min: 30
      max: 70
    volumes_per_vm:
      min: 1
      max: 3
    networks_per_tenant: 2
    tenants: 50
