<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cirrus-Sim Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --color-bg:#ffffff;
  --color-bg-subtle:#f5f6f7;
  --color-bg-muted:#ebedf0;
  --color-border:#dddfe2;
  --color-border-strong:#bec3c9;
  --color-text:#1c1e21;
  --color-text-secondary:#606770;
  --color-text-tertiary:#8a8d91;
  --color-accent:#1877f2;
  --color-accent-hover:#1466d4;
  --color-accent-subtle:#e7f3ff;
  --color-accent-border:#a3d0fb;
  --color-success:#31a24c;
  --color-success-subtle:#e9f7ed;
  --color-success-border:#a8dbb5;
  --color-warning:#f0960a;
  --color-warning-subtle:#fef4dc;
  --color-warning-border:#fad980;
  --color-danger:#e4363a;
  --color-danger-subtle:#fdebeb;
  --color-danger-border:#f5aaac;
  --color-chart-blue:#1877f2;
  --color-chart-green:#31a24c;
  --color-chart-amber:#f0960a;
  --color-chart-red:#e4363a;
  --color-chart-purple:#a033ff;
  --color-chart-cyan:#00a3e0;
  --font-sans:'Geist','Noto Sans JP',system-ui,sans-serif;
  --font-mono:'Geist Mono','JetBrains Mono',ui-monospace,monospace;
  --radius-sm:2px;
  --radius-md:4px;
  --radius-lg:6px;
  --radius-xl:8px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:0 1px 4px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.05);
}
html{font-size:13px;-webkit-font-smoothing:antialiased}
body{
  background:var(--color-bg-muted);
  color:var(--color-text);
  font-family:var(--font-sans);
  font-weight:400;
  min-height:100vh;
}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;
  background:var(--color-bg);
  border-bottom:1px solid var(--color-border);
  position:sticky;top:0;z-index:100;
}
.header-left{display:flex;align-items:center;gap:12px}
.logo{
  font-family:var(--font-sans);font-weight:600;font-size:15px;
  color:var(--color-text);letter-spacing:-0.03em;
}
.logo span{color:var(--color-text-tertiary);font-weight:400}
.header-tag{
  font-family:var(--font-mono);font-size:11px;font-weight:500;
  padding:2px 8px;border-radius:var(--radius-md);
  background:var(--color-accent-subtle);color:var(--color-accent);
  border:1px solid var(--color-accent-border);
  letter-spacing:0.03em;
}
.header-right{display:flex;align-items:center;gap:12px}
.clock{font-family:var(--font-mono);font-size:12px;color:var(--color-text-tertiary)}
.refresh-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--color-success);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── STATUS BAR ── */
.status-bar{
  display:flex;gap:0;
  background:var(--color-bg);
  border-bottom:1px solid var(--color-border);
  overflow-x:auto;
}
.status-chip{
  flex:1;min-width:110px;
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;
  border-right:1px solid var(--color-border);
  font-size:11px;font-weight:500;
  letter-spacing:0.03em;text-transform:uppercase;
  color:var(--color-text-secondary);
  cursor:pointer;transition:background 0.15s;
}
.status-chip:hover{background:var(--color-bg-subtle)}
.status-chip.active{background:var(--color-accent-subtle);color:var(--color-accent)}
.status-chip:last-child{border-right:none}
.status-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  transition:background 0.3s;
}
.status-dot.up{background:var(--color-success)}
.status-dot.down{background:var(--color-danger)}
.status-dot.unknown{background:var(--color-text-tertiary)}

/* ── LAYOUT ── */
.main{display:flex;min-height:calc(100vh - 90px)}
.grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px;
  padding:16px;
  align-content:start;
}

/* ── CARD ── */
.card{
  background:var(--color-bg);
  border:1px solid var(--color-border);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-md);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:box-shadow 0.15s;
}
.card:hover{box-shadow:var(--shadow-lg)}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid var(--color-border);
  background:var(--color-bg-subtle);
  cursor:pointer;
}
.card-title{
  font-size:13px;font-weight:600;letter-spacing:-0.01em;
  color:var(--color-text);
}
.card-port{
  font-family:var(--font-mono);font-size:11px;
  color:var(--color-text-tertiary);
  padding:2px 6px;border-radius:var(--radius-sm);
  background:var(--color-bg-muted);border:1px solid var(--color-border);
}
.card-body{padding:16px;display:flex;flex-direction:column;gap:12px}

/* ── METRICS ── */
.metrics{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:8px;
}
.metric{
  display:flex;flex-direction:column;gap:2px;
  padding:8px 10px;border-radius:var(--radius-lg);
  background:var(--color-bg-subtle);
  border:1px solid var(--color-border);
  transition:border-color 0.15s;
}
.metric:hover{border-color:var(--color-border-strong)}
.metric-val{
  font-family:var(--font-mono);font-weight:600;font-size:20px;
  letter-spacing:-0.03em;line-height:1;
  color:var(--color-text);
}
.metric-val.blue{color:var(--color-chart-blue)}
.metric-val.green{color:var(--color-chart-green)}
.metric-val.amber{color:var(--color-chart-amber)}
.metric-val.red{color:var(--color-chart-red)}
.metric-val.purple{color:var(--color-chart-purple)}
.metric-val.cyan{color:var(--color-chart-cyan)}
.metric-lbl{
  font-size:11px;font-weight:500;
  color:var(--color-text-tertiary);
  letter-spacing:0.03em;text-transform:uppercase;
}

/* ── TABLE ── */
.tbl{font-size:12px;width:100%;border-collapse:collapse}
.tbl th{
  text-align:left;padding:6px 12px;
  font-size:11px;font-weight:500;
  color:var(--color-text-tertiary);
  letter-spacing:0.03em;text-transform:uppercase;
  background:var(--color-bg-subtle);
  border-bottom:1px solid var(--color-border);
}
.tbl td{
  padding:7px 12px;
  border-bottom:1px solid var(--color-border);
  color:var(--color-text-secondary);
}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--color-bg-subtle);color:var(--color-text)}
.tbl .mono{font-family:var(--font-mono);font-size:12px}
.tbl .clickable{cursor:pointer}
.tbl .clickable:hover td{color:var(--color-accent)}

/* ── BADGE ── */
.badge{
  display:inline-block;padding:1px 6px;border-radius:var(--radius-md);
  font-size:11px;font-weight:500;letter-spacing:0.03em;
}
.badge-success{background:var(--color-success-subtle);color:var(--color-success);border:1px solid var(--color-success-border)}
.badge-warning{background:var(--color-warning-subtle);color:var(--color-warning);border:1px solid var(--color-warning-border)}
.badge-danger{background:var(--color-danger-subtle);color:var(--color-danger);border:1px solid var(--color-danger-border)}
.badge-accent{background:var(--color-accent-subtle);color:var(--color-accent);border:1px solid var(--color-accent-border)}
.badge-muted{background:var(--color-bg-muted);color:var(--color-text-tertiary);border:1px solid var(--color-border)}

/* ── CAPACITY BAR ── */
.cap-row{display:flex;flex-direction:column;gap:4px}
.cap-header{display:flex;justify-content:space-between;align-items:baseline}
.cap-name{font-size:12px;color:var(--color-text-secondary);display:flex;align-items:center;gap:6px}
.cap-pct{font-family:var(--font-mono);font-size:12px;font-weight:500}
.cap-track{height:6px;border-radius:3px;background:var(--color-bg-muted);overflow:hidden}
.cap-fill{height:100%;border-radius:3px;transition:width 0.6s cubic-bezier(0.22,1,0.36,1)}
.cap-fill.low{background:var(--color-success)}
.cap-fill.med{background:var(--color-warning)}
.cap-fill.high{background:var(--color-danger)}

/* ── DETAIL PANEL ── */
.detail{
  position:fixed;top:0;right:-480px;bottom:0;width:480px;
  background:var(--color-bg);
  border-left:1px solid var(--color-border);
  box-shadow:var(--shadow-lg);
  z-index:200;
  transition:right 0.25s cubic-bezier(0.22,1,0.36,1);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.detail.open{right:0}
.detail-backdrop{
  position:fixed;inset:0;z-index:199;
  background:rgba(0,0,0,0.15);
  opacity:0;pointer-events:none;
  transition:opacity 0.25s;
}
.detail-backdrop.open{opacity:1;pointer-events:auto}
.detail-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid var(--color-border);
  background:var(--color-bg-subtle);
}
.detail-title{font-size:13px;font-weight:600}
.detail-close{
  border:none;background:none;cursor:pointer;
  font-size:18px;color:var(--color-text-tertiary);
  padding:4px 8px;border-radius:var(--radius-md);
}
.detail-close:hover{background:var(--color-bg-muted);color:var(--color-text)}
.detail-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.detail-section-title{
  font-size:11px;font-weight:500;color:var(--color-text-tertiary);
  letter-spacing:0.03em;text-transform:uppercase;
  padding-bottom:4px;border-bottom:1px solid var(--color-border);
}

/* ── EMPTY & OFFLINE ── */
.empty{
  text-align:center;padding:20px;
  font-size:12px;color:var(--color-text-tertiary);
}
.offline-banner{
  text-align:center;padding:16px;
  color:var(--color-danger);font-size:12px;font-weight:500;
  background:var(--color-danger-subtle);
  border:1px solid var(--color-danger-border);
  border-radius:var(--radius-lg);
}

/* ── FOOTER ── */
.footer{
  padding:8px 24px;
  border-top:1px solid var(--color-border);
  background:var(--color-bg);
  font-size:11px;color:var(--color-text-tertiary);
  display:flex;justify-content:space-between;
}

/* ── PAGER ── */
.pager{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 0;font-size:11px;color:var(--color-text-tertiary);
}
.pager-btns{display:flex;gap:4px}
.pager-btn{
  border:1px solid var(--color-border);background:var(--color-bg);
  color:var(--color-text-secondary);
  padding:3px 10px;border-radius:var(--radius-md);
  font-size:11px;font-weight:500;cursor:pointer;
  transition:background 0.15s,border-color 0.15s;
}
.pager-btn:hover:not(:disabled){background:var(--color-bg-subtle);border-color:var(--color-border-strong)}
.pager-btn:disabled{opacity:0.35;cursor:default}

/* ── KV DETAIL ── */
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12px}
.kv-key{color:var(--color-text-tertiary);font-weight:500}
.kv-val{color:var(--color-text);font-family:var(--font-mono);font-size:12px}

/* ── RESPONSIVE ── */
@media(max-width:800px){
  .grid{grid-template-columns:1fr;padding:8px}
  .header{padding:10px 12px}
  .detail{width:100%;right:-100%}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">Cirrus<span>-Sim</span></div>
    <div class="header-tag">DASHBOARD</div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--:--</div>
    <div class="refresh-dot"></div>
  </div>
</div>

<div class="status-bar" id="statusBar"></div>

<div class="main">
  <div class="grid" id="grid"></div>
</div>

<div class="detail-backdrop" id="detailBackdrop"></div>
<div class="detail" id="detailPanel">
  <div class="detail-head">
    <div class="detail-title" id="detailTitle"></div>
    <button class="detail-close" id="detailClose">&times;</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<div class="footer">
  <span id="footerVersion">Cirrus-Sim Dashboard</span>
  <span id="lastUpdate">Connecting...</span>
</div>

<script>
// ── Config ──
const SIMS = [
  { id:'libvirt-sim', label:'Libvirt-Sim', port:8100 },
  { id:'storage-sim', label:'Storage-Sim', port:8500 },
  { id:'ovn-sim',     label:'OVN-Sim',     port:8200 },
  { id:'awx-sim',     label:'AWX-Sim',     port:8300 },
  { id:'netbox-sim',  label:'NetBox-Sim',  port:8400 },
  { id:'common',      label:'Common',      port:8000 },
];

const state = {};
let prevJSON = {};
const PAGE_SIZE = 8;
const pages = {}; // pages[simId] = current page (0-based)
SIMS.forEach(s => { state[s.id] = { online: null, data: null }; prevJSON[s.id] = ''; pages[s.id] = 0; });

// ── Clock ──
function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toTimeString().slice(0,8);
}
setInterval(updateClock, 1000);
updateClock();

// ── Fetch ──
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function probeSimulator(sim) {
  try {
    let data = {};
    if (sim.id === 'common') {
      const [events, faults] = await Promise.all([
        fetchJSON('/proxy/common/api/v1/events?limit=5'),
        fetchJSON('/proxy/common/api/v1/faults'),
      ]);
      data = { events_total: events.total || 0, events: events.events || [], fault_rules: faults || [] };
    } else if (sim.id === 'libvirt-sim') {
      const [stats, hosts] = await Promise.all([
        fetchJSON('/proxy/libvirt-sim/sim/stats'),
        fetchJSON('/proxy/libvirt-sim/sim/hosts').catch(() => []),
      ]);
      data = { stats, hosts: Array.isArray(hosts) ? hosts : [] };
    } else if (sim.id === 'storage-sim') {
      const [stats, backends] = await Promise.all([
        fetchJSON('/proxy/storage-sim/sim/stats'),
        fetchJSON('/proxy/storage-sim/sim/backends').catch(() => []),
      ]);
      data = { stats, backends: Array.isArray(backends) ? backends : [] };
    } else if (sim.id === 'ovn-sim') {
      data = await fetchJSON('/proxy/ovn-sim/sim/stats');
    } else if (sim.id === 'awx-sim') {
      data = await fetchJSON('/proxy/awx-sim/sim/stats');
    } else if (sim.id === 'netbox-sim') {
      data = await fetchJSON('/proxy/netbox-sim/sim/stats');
    }
    state[sim.id] = { online: true, data };
  } catch {
    state[sim.id] = { online: false, data: null };
  }
}

// ── Status Bar (diff-based) ──
let prevStatusHTML = '';
function renderStatusBar() {
  const html = SIMS.map(s => {
    const st = state[s.id].online;
    const cls = st === true ? 'up' : st === false ? 'down' : 'unknown';
    return `<div class="status-chip" data-sim="${s.id}">
      <div class="status-dot ${cls}"></div>
      <span>${s.label}</span>
    </div>`;
  }).join('');
  if (html !== prevStatusHTML) {
    document.getElementById('statusBar').innerHTML = html;
    document.querySelectorAll('.status-chip').forEach(el => {
      el.addEventListener('click', () => openDetail(el.dataset.sim));
    });
    prevStatusHTML = html;
  }
}

// ── Card Rendering ──
function pctClass(p) { return p < 60 ? 'low' : p < 85 ? 'med' : 'high'; }
function pctColor(p) { return p < 60 ? 'green' : p < 85 ? 'amber' : 'red'; }
function badgeState(s) {
  if (s === 'active' || s === 'online') return 'badge-success';
  if (s === 'draining' || s === 'maintenance') return 'badge-warning';
  return 'badge-danger';
}

function renderCardBody(sim) {
  const s = state[sim.id];
  if (!s.online) return '<div class="offline-banner">Service offline</div>';

  const d = s.data;
  if (sim.id === 'libvirt-sim') return renderLibvirt(d);
  if (sim.id === 'storage-sim') return renderStorage(d);
  if (sim.id === 'ovn-sim') return renderOVN(d);
  if (sim.id === 'awx-sim') return renderAWX(d);
  if (sim.id === 'netbox-sim') return renderNetbox(d);
  if (sim.id === 'common') return renderCommon(d);
  return '';
}

function renderLibvirt(d) {
  const st = d.stats || {};
  const hosts = (d.hosts || []).slice().sort((a, b) => (a.host_id || '').localeCompare(b.host_id || ''));
  let html = `<div class="metrics">
    <div class="metric"><div class="metric-val blue">${st.total_hosts||0}</div><div class="metric-lbl">Hosts</div></div>
    <div class="metric"><div class="metric-val cyan">${st.total_domains||0}</div><div class="metric-lbl">Domains</div></div>
    <div class="metric"><div class="metric-val green">${st.running_domains||0}</div><div class="metric-lbl">Running</div></div>
    <div class="metric"><div class="metric-val amber">${st.total_vcpus_used||0}</div><div class="metric-lbl">vCPUs Used</div></div>
  </div>`;
  if (hosts.length > 0) {
    const page = pages['libvirt-sim'] || 0;
    const totalPages = Math.ceil(hosts.length / PAGE_SIZE);
    const start = page * PAGE_SIZE;
    const slice = hosts.slice(start, start + PAGE_SIZE);
    const rows = slice.map(h => {
      const vcpu = (h.cpu_sockets||0)*(h.cores_per_socket||0)*(h.threads_per_core||0);
      const mem = ((h.memory_mb||0)/1024).toFixed(0);
      const st = h.state || 'online';
      return `<tr class="clickable" data-host="${h.host_id}">
        <td class="mono">${h.host_id||'?'}</td>
        <td>${vcpu} vCPU</td>
        <td>${mem} GB</td>
        <td>${h.domain_count||0}</td>
        <td><span class="badge ${badgeState(st)}">${st}</span></td>
      </tr>`;
    }).join('');
    html += `<table class="tbl"><thead><tr><th>Host</th><th>CPU</th><th>Mem</th><th>VMs</th><th>State</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
    if (totalPages > 1) {
      html += `<div class="pager">
        <span>${start+1}-${Math.min(start+PAGE_SIZE, hosts.length)} / ${hosts.length}</span>
        <div class="pager-btns">
          <button class="pager-btn" data-pager="libvirt-sim" data-dir="prev" ${page===0?'disabled':''}>Prev</button>
          <button class="pager-btn" data-pager="libvirt-sim" data-dir="next" ${page>=totalPages-1?'disabled':''}>Next</button>
        </div>
      </div>`;
    }
  }
  return html;
}

function renderStorage(d) {
  const st = d.stats || {};
  const backends = d.backends || [];
  let html = `<div class="metrics">
    <div class="metric"><div class="metric-val blue">${st.backend_count||0}</div><div class="metric-lbl">Backends</div></div>
    <div class="metric"><div class="metric-val cyan">${st.volume_count||0}</div><div class="metric-lbl">Volumes</div></div>
    <div class="metric"><div class="metric-val purple">${st.export_count||0}</div><div class="metric-lbl">Exports</div></div>
  </div>`;
  if (backends.length > 0) {
    html += '<div style="display:flex;flex-direction:column;gap:8px">';
    backends.forEach(b => {
      const total = b.total_capacity_gb || 1;
      const alloc = b.allocated_capacity_gb || 0;
      const pct = Math.round((alloc / total) * 100);
      html += `<div class="cap-row">
        <div class="cap-header">
          <span class="cap-name">${b.backend_id} <span class="badge ${badgeState(b.state)}">${b.state}</span></span>
          <span class="cap-pct" style="color:var(--color-chart-${pctColor(pct)})">${pct}%</span>
        </div>
        <div class="cap-track"><div class="cap-fill ${pctClass(pct)}" style="width:${pct}%"></div></div>
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function renderOVN(d) {
  const clusters = d.clusters || {};
  const entries = Object.entries(clusters);
  let totalRows = 0;
  entries.forEach(([,v]) => { if (v && v.total_rows != null) totalRows += v.total_rows; });

  let html = `<div class="metrics">
    <div class="metric"><div class="metric-val blue">${d.cluster_count||0}</div><div class="metric-lbl">Clusters</div></div>
    <div class="metric"><div class="metric-val green">${totalRows}</div><div class="metric-lbl">Total Rows</div></div>
  </div>`;
  if (entries.length > 0) {
    const rows = entries.map(([name, info]) =>
      `<tr class="clickable" data-cluster="${name}">
        <td class="mono">${name}</td>
        <td>${info.table_count||0}</td>
        <td>${info.total_rows||0}</td>
      </tr>`
    ).join('');
    html += `<table class="tbl"><thead><tr><th>Cluster</th><th>Tables</th><th>Rows</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }
  return html;
}

function renderAWX(d) {

function renderCommon(d) {
  let html = `<div class="metrics">
    <div class="metric"><div class="metric-val blue">${d.events_total||0}</div><div class="metric-lbl">Events</div></div>
    <div class="metric"><div class="metric-val amber">${(d.fault_rules||[]).length}</div><div class="metric-lbl">Fault Rules</div></div>
  </div>`;
  const evts = d.events || [];
  if (evts.length > 0) {
    const rows = evts.slice(0,5).map(e => {
      const t = e.timestamp ? new Date(e.timestamp).toLocaleTimeString() : '';
      return `<tr>
        <td class="mono">${t}</td>
        <td>${e.simulator||''}</td>
        <td>${e.operation||''}</td>
      </tr>`;
    }).join('');
    html += `<table class="tbl"><thead><tr><th>Time</th><th>Sim</th><th>Operation</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }
  return html;
}

// ── Diff-based Grid Update ──
function renderGrid() {
  const grid = document.getElementById('grid');
  SIMS.forEach((sim, i) => {
    const json = JSON.stringify(state[sim.id]);
    let cardEl = grid.querySelector(`[data-card="${sim.id}"]`);

    if (!cardEl) {
      // First render: create the card element
      cardEl = document.createElement('div');
      cardEl.className = 'card';
      cardEl.dataset.card = sim.id;
      cardEl.innerHTML = `<div class="card-head" data-sim="${sim.id}">
        <div class="card-title">${sim.label}</div>
        <div class="card-port">:${sim.port}</div>
      </div>
      <div class="card-body"></div>`;
      grid.appendChild(cardEl);
      cardEl.querySelector('.card-head').addEventListener('click', () => openDetail(sim.id));
    }

    // Only update body if data changed
    if (json !== prevJSON[sim.id]) {
      // Clamp page if data shrunk
      if (sim.id === 'libvirt-sim' && state[sim.id].data) {
        const total = (state[sim.id].data.hosts || []).length;
        const maxPage = Math.max(0, Math.ceil(total / PAGE_SIZE) - 1);
        if (pages[sim.id] > maxPage) pages[sim.id] = maxPage;
      }
      const body = cardEl.querySelector('.card-body');
      body.innerHTML = renderCardBody(sim);
      prevJSON[sim.id] = json;

      // Attach click handlers for table rows
      if (sim.id === 'libvirt-sim') {
        body.querySelectorAll('[data-host]').forEach(tr => {
          tr.addEventListener('click', () => openHostDetail(tr.dataset.host));
        });
      }
      if (sim.id === 'ovn-sim') {
        body.querySelectorAll('[data-cluster]').forEach(tr => {
          tr.addEventListener('click', () => openClusterDetail(tr.dataset.cluster));
        });
      }
      // Attach pager handlers
      body.querySelectorAll('[data-pager]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const simId = btn.dataset.pager;
          const dir = btn.dataset.dir;
          if (dir === 'next') pages[simId]++;
          else if (dir === 'prev') pages[simId] = Math.max(0, pages[simId] - 1);
          // Force re-render this card
          prevJSON[simId] = '';
          renderGrid();
        });
      });
    }
  });
}

// ── Detail Panel ──
const detailPanel = document.getElementById('detailPanel');
const detailBackdrop = document.getElementById('detailBackdrop');
const detailTitle = document.getElementById('detailTitle');
const detailBody = document.getElementById('detailBody');
const detailClose = document.getElementById('detailClose');

function showDetail(title, html) {
  detailTitle.textContent = title;
  detailBody.innerHTML = html;
  detailPanel.classList.add('open');
  detailBackdrop.classList.add('open');
}
function closeDetail() {
  detailPanel.classList.remove('open');
  detailBackdrop.classList.remove('open');
}
detailClose.addEventListener('click', closeDetail);
detailBackdrop.addEventListener('click', closeDetail);

function openDetail(simId) {
  const sim = SIMS.find(s => s.id === simId);
  const s = state[simId];
  if (!sim) return;
  if (!s.online) {
    showDetail(sim.label, '<div class="offline-banner">Service offline</div>');
    return;
  }

  if (simId === 'libvirt-sim') openLibvirtDetail(s.data);
  else if (simId === 'storage-sim') openStorageDetail(s.data);
  else if (simId === 'ovn-sim') openOVNDetail(s.data);
  else if (simId === 'awx-sim') openAWXDetail(s.data);
  else if (simId === 'netbox-sim') openNetboxDetail(s.data);
  else if (simId === 'common') openCommonDetail(s.data);
}

function openLibvirtDetail(d) {
  const st = d.stats || {};
  const hosts = (d.hosts || []).slice().sort((a, b) => (a.host_id || '').localeCompare(b.host_id || ''));
  let html = `<div class="detail-section-title">Overview</div>
    <div class="kv">
      <span class="kv-key">Total Hosts</span><span class="kv-val">${st.total_hosts||0}</span>
      <span class="kv-key">Online Hosts</span><span class="kv-val">${st.online_hosts||0}</span>
      <span class="kv-key">Total Domains</span><span class="kv-val">${st.total_domains||0}</span>
      <span class="kv-key">Running Domains</span><span class="kv-val">${st.running_domains||0}</span>
      <span class="kv-key">vCPUs Used</span><span class="kv-val">${st.total_vcpus_used||0}</span>
      <span class="kv-key">Memory Used</span><span class="kv-val">${((st.total_memory_used_mb||0)/1024).toFixed(1)} GB</span>
    </div>`;
  if (hosts.length > 0) {
    html += `<div class="detail-section-title">Hosts (${hosts.length})</div>`;
    html += `<table class="tbl"><thead><tr><th>Host ID</th><th>CPU</th><th>Mem</th><th>VMs</th><th>State</th></tr></thead><tbody>`;
    hosts.forEach(h => {
      const vcpu = (h.cpu_sockets||0)*(h.cores_per_socket||0)*(h.threads_per_core||0);
      const mem = ((h.memory_mb||0)/1024).toFixed(0);
      html += `<tr class="clickable" data-host-detail="${h.host_id}">
        <td class="mono">${h.host_id||'?'}</td>
        <td>${vcpu} vCPU / ${h.used_vcpus||0} used</td>
        <td>${mem} GB / ${((h.used_memory_mb||0)/1024).toFixed(0)} used</td>
        <td>${h.domain_count||0}</td>
        <td><span class="badge ${badgeState(h.state||'online')}">${h.state||'online'}</span></td>
      </tr>`;
    });
    html += '</tbody></table>';
  }
  showDetail('Libvirt-Sim', html);
  detailBody.querySelectorAll('[data-host-detail]').forEach(tr => {
    tr.addEventListener('click', () => openHostDetail(tr.dataset.hostDetail));
  });
}

async function openHostDetail(hostId) {
  showDetail(`Host: ${hostId}`, '<div class="empty">Loading...</div>');
  try {
    const h = await fetchJSON(`/proxy/libvirt-sim/sim/hosts/${hostId}`);
    const vcpu = (h.cpu_sockets||0)*(h.cores_per_socket||0)*(h.threads_per_core||0);
    let html = `<div class="detail-section-title">Configuration</div>
      <div class="kv">
        <span class="kv-key">Host ID</span><span class="kv-val">${h.host_id}</span>
        <span class="kv-key">Libvirt Port</span><span class="kv-val">${h.libvirt_port}</span>
        <span class="kv-key">State</span><span class="kv-val"><span class="badge ${badgeState(h.state||'online')}">${h.state||'online'}</span></span>
        <span class="kv-key">CPU Model</span><span class="kv-val">${h.cpu_model||'-'}</span>
        <span class="kv-key">CPU</span><span class="kv-val">${h.cpu_sockets||0}S x ${h.cores_per_socket||0}C x ${h.threads_per_core||0}T = ${vcpu} vCPUs</span>
        <span class="kv-key">Memory</span><span class="kv-val">${((h.memory_mb||0)/1024).toFixed(0)} GB</span>
        <span class="kv-key">CPU Overcommit</span><span class="kv-val">${h.cpu_overcommit_ratio||1}x</span>
        <span class="kv-key">Mem Overcommit</span><span class="kv-val">${h.memory_overcommit_ratio||1}x</span>
      </div>
      <div class="detail-section-title">Resource Usage</div>
      <div class="kv">
        <span class="kv-key">vCPUs Used</span><span class="kv-val">${h.used_vcpus||0} / ${Math.round(vcpu * (h.cpu_overcommit_ratio||1))}</span>
        <span class="kv-key">Memory Used</span><span class="kv-val">${((h.used_memory_mb||0)/1024).toFixed(1)} / ${((h.memory_mb||0)/1024*(h.memory_overcommit_ratio||1)).toFixed(0)} GB</span>
        <span class="kv-key">Domains</span><span class="kv-val">${h.domain_count||0}</span>
      </div>`;

    if (h.numa_topology && h.numa_topology.length > 0) {
      html += `<div class="detail-section-title">NUMA Topology</div>
        <table class="tbl"><thead><tr><th>Node</th><th>Cores</th><th>Memory</th></tr></thead><tbody>`;
      h.numa_topology.forEach((n, i) => {
        html += `<tr><td>Node ${i}</td><td>${n.cores||0}</td><td>${((n.memory_mb||0)/1024).toFixed(0)} GB</td></tr>`;
      });
      html += '</tbody></table>';
    }

    if (h.gpus && h.gpus.length > 0) {
      html += `<div class="detail-section-title">GPUs</div>
        <table class="tbl"><thead><tr><th>Model</th><th>Address</th></tr></thead><tbody>`;
      h.gpus.forEach(g => {
        html += `<tr><td>${g.model||'-'}</td><td class="mono">${g.address||'-'}</td></tr>`;
      });
      html += '</tbody></table>';
    }

    showDetail(`Host: ${hostId}`, html);
  } catch (e) {
    showDetail(`Host: ${hostId}`, `<div class="offline-banner">Failed to load: ${e.message}</div>`);
  }
}

function openStorageDetail(d) {
  const st = d.stats || {};
  const backends = d.backends || [];
  let html = `<div class="detail-section-title">Overview</div>
    <div class="kv">
      <span class="kv-key">Backends</span><span class="kv-val">${st.backend_count||0}</span>
      <span class="kv-key">Volumes</span><span class="kv-val">${st.volume_count||0}</span>
      <span class="kv-key">Exports</span><span class="kv-val">${st.export_count||0}</span>
    </div>`;
  if (backends.length > 0) {
    html += `<div class="detail-section-title">Backends (${backends.length})</div>`;
    backends.forEach(b => {
      const total = b.total_capacity_gb || 1;
      const used = b.used_capacity_gb || 0;
      const alloc = b.allocated_capacity_gb || 0;
      const pct = Math.round((alloc / total) * 100);
      html += `<div style="margin-bottom:12px">
        <div class="cap-header" style="margin-bottom:4px">
          <span class="cap-name">${b.backend_id} <span class="badge ${badgeState(b.state)}">${b.state}</span></span>
          <span class="cap-pct" style="color:var(--color-chart-${pctColor(pct)})">${pct}%</span>
        </div>
        <div class="cap-track"><div class="cap-fill ${pctClass(pct)}" style="width:${pct}%"></div></div>
        <div class="kv" style="margin-top:8px">
          <span class="kv-key">Total</span><span class="kv-val">${total} GB</span>
          <span class="kv-key">Used</span><span class="kv-val">${used} GB</span>
          <span class="kv-key">Allocated</span><span class="kv-val">${alloc} GB</span>
        </div>
      </div>`;
    });
  }
  showDetail('Storage-Sim', html);
}

function openOVNDetail(d) {
  const clusters = d.clusters || {};
  const entries = Object.entries(clusters);
  let html = `<div class="detail-section-title">Overview</div>
    <div class="kv">
      <span class="kv-key">Clusters</span><span class="kv-val">${d.cluster_count||0}</span>
    </div>`;
  if (entries.length > 0) {
    html += `<div class="detail-section-title">Clusters</div>`;
    entries.forEach(([name, info]) => {
      html += `<div style="margin-bottom:12px">
        <div style="font-size:13px;font-weight:600;margin-bottom:6px">${name}</div>
        <div class="kv">
          <span class="kv-key">Tables</span><span class="kv-val">${info.table_count||0}</span>
          <span class="kv-key">Rows</span><span class="kv-val">${info.total_rows||0}</span>
        </div>`;
      if (info.tables) {
        html += `<table class="tbl" style="margin-top:8px"><thead><tr><th>Table</th><th>Rows</th></tr></thead><tbody>`;
        Object.entries(info.tables).forEach(([tbl, cnt]) => {
          html += `<tr><td class="mono">${tbl}</td><td>${cnt}</td></tr>`;
        });
        html += '</tbody></table>';
      }
      html += '</div>';
    });
  }
  showDetail('OVN-Sim', html);
}

async function openClusterDetail(clusterId) {
  const d = state['ovn-sim'].data;
  if (!d || !d.clusters || !d.clusters[clusterId]) return;
  const info = d.clusters[clusterId];
  let html = `<div class="detail-section-title">Cluster: ${clusterId}</div>
    <div class="kv">
      <span class="kv-key">Tables</span><span class="kv-val">${info.table_count||0}</span>
      <span class="kv-key">Total Rows</span><span class="kv-val">${info.total_rows||0}</span>
    </div>`;
  if (info.tables) {
    html += `<div class="detail-section-title">Tables</div>
      <table class="tbl"><thead><tr><th>Table</th><th>Rows</th></tr></thead><tbody>`;
    Object.entries(info.tables).sort((a,b) => b[1] - a[1]).forEach(([tbl, cnt]) => {
      html += `<tr><td class="mono">${tbl}</td><td>${cnt}</td></tr>`;
    });
    html += '</tbody></table>';
  }
  showDetail(`OVN Cluster: ${clusterId}`, html);
}

async function openNetboxDetail(d) {
  let html = `<div class="detail-section-title">Overview</div>
    <div class="kv">
      <span class="kv-key">Sites</span><span class="kv-val">${d.site_count||0}</span>
      <span class="kv-key">Racks</span><span class="kv-val">${d.rack_count||0}</span>
      <span class="kv-key">Devices</span><span class="kv-val">${d.device_count||0}</span>
      <span class="kv-key">Locations</span><span class="kv-val">${d.location_count||0}</span>
    </div>`;

  // Try to fetch sites for detail
  try {
    const sites = await fetchJSON('/proxy/netbox-sim/api/dcim/sites/');
    if (sites.results && sites.results.length > 0) {
      html += `<div class="detail-section-title">Sites (${sites.count||sites.results.length})</div>
        <table class="tbl"><thead><tr><th>Name</th><th>Status</th><th>Region</th></tr></thead><tbody>`;
      sites.results.forEach(s => {
        html += `<tr><td class="mono">${s.name||'-'}</td>
          <td><span class="badge ${s.status === 'active' ? 'badge-success' : 'badge-muted'}">${s.status||'-'}</span></td>
          <td>${s.region||'-'}</td></tr>`;
      });
      html += '</tbody></table>';
    }
  } catch {}

  showDetail('NetBox-Sim', html);
}

function openCommonDetail(d) {
  let html = `<div class="detail-section-title">Event Log</div>
    <div class="kv">
      <span class="kv-key">Total Events</span><span class="kv-val">${d.events_total||0}</span>
    </div>`;

  const evts = d.events || [];
  if (evts.length > 0) {
    html += `<table class="tbl" style="margin-top:8px">
      <thead><tr><th>Time</th><th>Sim</th><th>Host</th><th>Operation</th></tr></thead><tbody>`;
    evts.forEach(e => {
      const t = e.timestamp ? new Date(e.timestamp).toLocaleTimeString() : '';
      html += `<tr><td class="mono">${t}</td><td>${e.simulator||''}</td><td class="mono">${e.host_id||'-'}</td><td>${e.operation||''}</td></tr>`;
    });
    html += '</tbody></table>';
  }

  const rules = d.fault_rules || [];
  html += `<div class="detail-section-title" style="margin-top:8px">Fault Rules (${rules.length})</div>`;
  if (rules.length > 0) {
    html += `<table class="tbl"><thead><tr><th>Target</th><th>Operation</th><th>Rate</th><th>Latency</th></tr></thead><tbody>`;
    rules.forEach(r => {
      html += `<tr><td class="mono">${r.target||'*'}</td><td>${r.operation||'*'}</td>
        <td>${r.failure_rate != null ? (r.failure_rate*100).toFixed(0)+'%' : '-'}</td>
        <td>${r.latency_ms ? r.latency_ms+'ms' : '-'}</td></tr>`;
    });
    html += '</tbody></table>';
  } else {
    html += '<div class="empty">No fault rules configured</div>';
  }
  showDetail('Common', html);
}

// ── Poll Loop ──
async function poll() {
  await Promise.all(SIMS.map(s => probeSimulator(s)));
  renderStatusBar();
  renderGrid();
  document.getElementById('lastUpdate').textContent =
    'Updated: ' + new Date().toLocaleTimeString();
}

// ── Fetch version ──
fetchJSON('/api/version').then(v => {
  document.getElementById('footerVersion').textContent = 'Cirrus-Sim Dashboard ' + (v.version || '');
}).catch(() => {});

poll();
setInterval(poll, 3000);
</script>
